<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chenchaiah Mekalathuru — AI/ML & LLM Inference Engineer</title>
    <!--
      Single Page Apps for GitHub Pages
      MIT License — https://github.com/rafgraph/spa-github-pages
      Redirects a deep-link request to index.html, encoding the path in the query
      string so the SPA router can restore it. pathSegmentsToKeep = 1 keeps the
      "/myPortfolio" project base in the path.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
