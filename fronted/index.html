    <!--
      Single Page Apps for GitHub Pages — restores the path encoded by 404.html
      before the router mounts. https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
